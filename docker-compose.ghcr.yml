# docker-compose.ghcr.yml
# Production deployment using pre-built images from GitHub Container Registry
#
# USAGE:
#   1. Create .env file with secure passwords (see .env.example)
#   2. Login to GHCR: echo $GITHUB_TOKEN | docker login ghcr.io -u njhughes-01 --password-stdin
#   3. Pull images: docker compose -f docker-compose.ghcr.yml pull
#   4. Start services: docker compose -f docker-compose.ghcr.yml up -d
#
# SECURITY: All images updated March 26, 2026 with latest security patches

services:
  # Secrets Generation (runs once on first startup)
  secrets-init:
    image: ghcr.io/njhughes-01/bracketofdeath-secrets-init:latest
    container_name: bod-secrets-init
    volumes:
      - secrets-data:/secrets
    networks:
      - bod-network
    restart: "no"

  # Keycloak Authentication Server (internal only)
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: bod-keycloak
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /secrets/keycloak_admin_password ]; then
          export KEYCLOAK_ADMIN_PASSWORD=$(cat /secrets/keycloak_admin_password)
        fi
        /opt/keycloak/bin/kc.sh start-dev
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      keycloak-db:
        condition: service_healthy
    volumes:
      - secrets-data:/secrets:ro
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_URL: http://localhost:8081
    ports:
      - "8081:8080"
    networks:
      - bod-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Keycloak Database
  keycloak-db:
    image: postgres:15.17
    container_name: bod-keycloak-db
    restart: unless-stopped
    depends_on:
      secrets-init:
        condition: service_completed_successfully
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
      - secrets-data:/secrets:ro
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD_FILE: ${KEYCLOAK_DB_PASSWORD_FILE:-/secrets/keycloak_db_password}
    networks:
      - bod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d keycloak"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MongoDB Database (internal only)
  mongodb:
    image: mongo:8.0.19  # Latest stable with security fixes (CVE-2026-1847-1850, CVE-2026-25609-25613)
    container_name: bod-mongodb
    restart: unless-stopped
    depends_on:
      secrets-init:
        condition: service_completed_successfully
    command:
      [
        "mongod",
        "--auth",
        "--bind_ip_all",
        "--logpath",
        "/var/log/mongodb/mongod.log",
      ]
    volumes:
      - mongodb-data:/data/db
      - mongodb-logs:/var/log/mongodb
      - secrets-data:/secrets:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-bodadmin}
      MONGO_INITDB_ROOT_PASSWORD_FILE: ${MONGO_INITDB_ROOT_PASSWORD_FILE:-/secrets/mongo_root_password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-bracket_of_death}
    ports:
      - "27018:27017"
    networks:
      - bod-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
          "--host",
          "localhost",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Keycloak Initialization Service (runs once)
  keycloak-init:
    image: ghcr.io/njhughes-01/bracketofdeath-keycloak-init:latest
    container_name: bod-keycloak-init
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    volumes:
      - secrets-data:/secrets:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bracketofdeathsite}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-bod-app}
      APP_URL: ${APP_URL:-http://localhost:5173}
    networks:
      - bod-network
    restart: "no"

  # Data Initialization Service (runs once)
  data-init:
    image: ghcr.io/njhughes-01/bracketofdeath-data-init:latest
    container_name: bod-data-init
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    volumes:
      - data-init-status:/app/status
      - secrets-data:/secrets:ro
    environment:
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-bodadmin}:${MONGO_INITDB_ROOT_PASSWORD:-bodpassword123}@mongodb:27017/${MONGO_INITDB_DATABASE:-bracket_of_death}?authSource=admin
    networks:
      - bod-network
    restart: "no"

  # Backend API (internal only)
  backend:
    image: ghcr.io/njhughes-01/bracketofdeath-backend:latest
    container_name: bod-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
    volumes:
      - backend-logs:/app/logs
      - secrets-data:/secrets:ro
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-bodadmin}:${MONGO_INITDB_ROOT_PASSWORD:-bodpassword123}@mongodb:27017/${MONGO_INITDB_DATABASE:-bracket_of_death}?authSource=admin
      JWT_SECRET_FILE: ${JWT_SECRET_FILE:-/secrets/jwt_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
      APP_URL: ${APP_URL:-http://localhost:5173}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bracketofdeathsite}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-bod-app}
      KEYCLOAK_CLIENT_SECRET_FILE: ${KEYCLOAK_CLIENT_SECRET_FILE:-/secrets/keycloak_client_secret}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-bracketofdeathsite}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      # Mailjet email configuration (optional)
      MAILJET_API_KEY: ${MAILJET_API_KEY:-}
      MAILJET_API_SECRET: ${MAILJET_API_SECRET:-}
      MAILJET_SENDER_EMAIL: ${MAILJET_SENDER_EMAIL:-noreply@bracketofdeath.com}
      # Stripe configuration (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "3001:3000"
    networks:
      - bod-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Frontend (exposed to user)
  frontend:
    image: ghcr.io/njhughes-01/bracketofdeath-frontend:latest
    container_name: bod-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-/auth}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bracketofdeathsite}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-bod-app}
      PROXY_TARGET: http://backend:3000
      KEYCLOAK_PROXY_TARGET: http://keycloak:8080
    ports:
      - "${PORT:-5173}:5173"
    networks:
      - bod-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://0.0.0.0:5173",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bod-network:
    driver: bridge

volumes:
  secrets-data:
    driver: local
  mongodb-data:
    driver: local
  mongodb-logs:
    driver: local
  keycloak-db-data:
    driver: local
  data-init-status:
    driver: local
  backend-logs:
    driver: local
